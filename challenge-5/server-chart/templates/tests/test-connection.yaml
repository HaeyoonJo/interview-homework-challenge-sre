apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "server-chart.fullname" . }}-test-connection"
  labels:
    app.kubernetes.io/name: {{ include "server-chart.name" . }}
    helm.sh/chart: {{ include "server-chart.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ['curl']
      args:  ['-H', 'Challenge: orcrist.org', 'http://{{ include "server-chart.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never